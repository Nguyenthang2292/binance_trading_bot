<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binance Trading Bot — Module Architecture</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0d1117;
  --surface: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --c-entry: #3fb950;
  --c-orch:  #58a6ff;
  --c-biz:   #ffa657;
  --c-infra: #d2a8ff;
  --c-found: #79c0ff;
}

body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
  overflow: hidden;
}

/* ── Header ─────────────────────────────────── */
header {
  padding: 12px 20px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 700; color: var(--text); }
header span { font-size: 12px; color: var(--muted); }
.hbadge {
  margin-left: auto;
  padding: 2px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  background: #1c2d41;
  border: 1px solid #1f6feb;
  color: var(--c-orch);
}

/* ── Layout ──────────────────────────────────── */
#layout {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* ── Diagram ─────────────────────────────────── */
#diagram-wrap {
  flex: 1;
  position: relative;
  overflow: auto;
  background: var(--bg);
}

#canvas {
  position: relative;
  width: 1280px;
  height: 760px;
}

#edge-svg {
  position: absolute;
  inset: 0;
  width: 1280px;
  height: 760px;
  pointer-events: none;
}

/* ── Module boxes ────────────────────────────── */
.mbox {
  position: absolute;
  width: 148px;
  height: 58px;
  border-radius: 9px;
  border: 1.5px solid;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: box-shadow .18s, transform .18s;
  text-align: center;
  user-select: none;
}
.mbox:hover { transform: translate(-50%,-50%) scale(1.06); box-shadow: 0 0 18px currentColor; z-index: 4; }
.mbox.sel   { transform: translate(-50%,-50%) scale(1.09); box-shadow: 0 0 26px currentColor; z-index: 5; }
.mn  { font-size: 13px; font-weight: 700; letter-spacing: .2px; }
.ms  { font-size: 10px; opacity: .65; margin-top: 2px; }

.l-entry { background:#0d200d; border-color:#3fb950; color:#3fb950; }
.l-orch  { background:#0d1b2e; border-color:#58a6ff; color:#58a6ff; }
.l-biz   { background:#201308; border-color:#ffa657; color:#ffa657; }
.l-infra { background:#1a0e2e; border-color:#d2a8ff; color:#d2a8ff; }
.l-found { background:#0d1a2b; border-color:#79c0ff; color:#79c0ff; }

/* ── Legend ──────────────────────────────────── */
#legend {
  position: absolute;
  bottom: 14px;
  left: 14px;
  background: #161b22ee;
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 11px;
  pointer-events: none;
}
#legend .lt { font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .8px; margin-bottom: 7px; }
.li { display: flex; align-items: center; gap: 7px; margin: 4px 0; color: var(--muted); }
.ld { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

/* ── Sidebar ─────────────────────────────────── */
#sidebar {
  width: 360px;
  min-width: 360px;
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

#sb-inner { padding: 20px; overflow-y: auto; flex: 1; }

.empty {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100%;
  color: var(--muted);
  text-align: center;
  gap: 10px;
  opacity: .6;
}
.empty p { font-size: 13px; }

.mtitle { font-size: 21px; font-weight: 700; margin-bottom: 7px; }
.lbadge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .7px;
  margin-bottom: 16px;
}
.dot6 { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

.slabel {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--muted);
  margin: 18px 0 8px;
  padding-bottom: 5px;
  border-bottom: 1px solid var(--border);
}

.desc { font-size: 13px; line-height: 1.65; color: #c9d1d9; }

.cls-list { display: flex; flex-direction: column; gap: 6px; }
.cls {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
}
.cname { font-size: 12.5px; font-weight: 600; color: #ffa657; font-family: 'Cascadia Code','Fira Code',monospace; }
.cdesc { font-size: 11.5px; color: var(--muted); margin-top: 2px; line-height: 1.4; }

.feat-list { display: flex; flex-direction: column; gap: 4px; }
.feat {
  display: flex;
  gap: 8px;
  font-size: 12px;
  color: #c9d1d9;
  line-height: 1.45;
}
.feat-dot { color: #ffa657; flex-shrink: 0; font-size: 10px; margin-top: 2px; }

.tag-row { display: flex; flex-wrap: wrap; gap: 5px; }
.ptag {
  padding: 3px 9px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 600;
  background: #1c2d41;
  border: 1px solid #1f6feb44;
  color: var(--c-orch);
}

.int-list { display: flex; flex-direction: column; gap: 5px; }
.int-item {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 7px 10px;
  border-radius: 6px;
  background: var(--bg);
  border: 1px solid var(--border);
  cursor: pointer;
  transition: border-color .15s;
  font-size: 12px;
  color: #c9d1d9;
}
.int-item:hover { border-color: var(--c-orch); }
.arr { font-weight: 700; font-size: 13px; flex-shrink: 0; }
.arr.out { color: var(--c-orch); }
.arr.in  { color: var(--c-entry); }
.iname { font-weight: 600; }
.ilbl  { color: var(--muted); font-size: 11px; }
</style>
</head>
<body>

<header>
  <h1>⚡ Binance Trading Bot</h1>
  <span>Module Architecture &amp; Interaction Map</span>
  <span class="hbadge">C++20 · Boost.Asio · 17 Modules</span>
</header>

  <div id="diagram-wrap">

          <div class="li"><svg width="28" height="10"><line x1="0" y1="5" x2="22" y2="5" stroke="#3fb950" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arr-c)"/></svg>callback / event</div>

<script>
// ── Module data ──────────────────────────────────────────────────────────────
const MODS = {
  main: {
    id:'main', label:'main.cpp', sub:'Entry Point', layer:'entry',
    x:640, y:70,
    desc:'Application entry point. Parses config.json, initialises every subsystem in dependency order (context → catalog → scanner → orders → account → risk → backtest gate → qlib orchestration → engine), wires concrete port adapters via dependency injection, spawns the Boost.Asio io_context thread pool, and handles graceful shutdown on SIGINT/SIGTERM.',
    classes:[
      {n:'main()', d:'Bootstrap: config → catalog → context → scanner → orders → account → risk → orchestration → engine → run'}
    ],
    patterns:['Bootstrap','Composition Root','Dependency Injection'],
    features:[
      'Parses config.json for all subsystem configs',
      'CLI flag: --list-strategies prints catalog then exits',
      'Wires concrete port adapters into SignalEngine',
      'Builds optional RiskController, BacktestGateController, Qlib orchestration',
      'Thread pool size configurable via config',
      'SIGINT/SIGTERM handler triggers graceful shutdown'
    ]
  },

  catalog: {
    id:'catalog', label:'Catalog', sub:'Plugin Management', layer:'orch',
    x:320, y:200,
    desc:'Dynamic strategy plugin management system. Scans the plugins/ directory at startup, loads .dll files via the Windows API, extracts C ABI function pointers, and registers IStrategy instances into StrategyRegistry. Strategies can be added without recompiling the bot.',
    classes:[
      {n:'StrategyCatalog',  d:'Main orchestrator: combines PluginLoader + StrategyRegistry'},
      {n:'PluginLoader',     d:'Scans plugins/ dir, loads DLLs, creates IStrategy instances'},
      {n:'PluginHandle',     d:'RAII wrapper managing Windows HMODULE DLL lifetime'},
      {n:'CatalogReporter',  d:'CLI output and runtime status logging for loaded strategies'}
    ],
    patterns:['Plugin Architecture','Registry','RAII','Adapter'],
    features:[
      'C ABI contract: createStrategy / destroyStrategy / strategyType / pluginVersion',
      '1 DLL = 1 strategy type — no core rebuild needed',
      'Load errors isolated per plugin; others continue',
      'LoadSummary reports plugins found / loaded / failed',
      '--list-strategies CLI mode supported via CatalogReporter'
    ]
  },

  orchestration: {
    id:'orchestration', label:'Orchestration', sub:'Qlib Lifecycle', layer:'orch',
    x:640, y:200,
    desc:'Qlib ML model lifecycle controller. Schedules nightly batch retraining and per-candle inference subprocesses (tools/qlib_bridge/*.py), parses their output, persists shadow-mode predictions into SQLite, evaluates promotion rules against live metrics, and exposes execution-mode state (Shadow / ShadowOnly / LiveCanary / Live) to the engine via IExecutionStatePort.',
    classes:[
      {n:'BatchSchedulerThread',  d:'Cron-style retraining trigger (weekday + hour + minute)'},
      {n:'CandleSchedulerThread', d:'Post-candle inference scheduler with configurable delay'},
      {n:'ProcessManager',        d:'Spawns Python subprocesses with retry / timeout / daemon mgmt'},
      {n:'PromotionChecker',      d:'Decides Shadow → LiveCanary → Live based on metrics'},
      {n:'QlibStateStore',        d:'SQLite-backed runtime state (model_id, run_id, exec mode)'},
      {n:'ShadowMetricsRecorder', d:'Records would-have-executed signals + cost-adjusted PnL'}
    ],
    patterns:['Scheduler','Subprocess Supervisor','Outbox','Promotion Gate'],
    features:[
      'Process-level isolation between bot and Qlib Python toolchain',
      'Daemon supervision via Win32 Job Objects / POSIX pid tracking',
      'Promotion gated by min_candles / min_sharpe / min_hit_rate / min_mean_net_return_bps',
      'Cost model: round-trip fee + slippage + funding bps',
      'IExecutionStatePort + IShadowMetricsPort decouple engine from SQLite'
    ]
  },

  engine: {
    id:'engine', label:'Engine', sub:'Signal Processing', layer:'orch',
    x:960, y:200,
    desc:'Core async trading loop. Builds a cartesian product of (symbols × intervals × strategies) as a WorkQueue, evaluates each combination each scan cycle, opens positions with ATR-based sizing, runs parallel timer loops for time-based and trailing-stop exits, and orchestrates pluggable gates: Gemini filter, BacktestGate, ExposureController, OrderCap, RiskController, LossManager.',
    classes:[
      {n:'SignalEngine',           d:'Async coroutine loop: run() → runScanCycle() → processItem()'},
      {n:'PositionTracker',        d:'Thread-safe map of open TrackedPositions (symbol → position)'},
      {n:'WorkQueue',              d:'Builds cartesian product: symbols × intervals × strategies'},
      {n:'SizingPolicy',           d:'ATR-based size = balance × risk_pct / (atr × sl_multiplier)'},
      {n:'GeminiFilterController', d:'Sentiment + vision LLM filter invoked per signal (Python subprocess)'},
      {n:'LossManager',            d:'ROI-based break-even take-profit + DCA averaging'},
      {n:'ExposureController',     d:'Net/gross beta exposure caps via BetaCalculator'},
      {n:'TotalNotionalGuard',     d:'OrderCap port limiting total open notional vs margin'},
      {n:'TrailingStopController', d:'Swing-low/high based trailing SL refresh on closed candles'},
      {n:'QlibExecutionPlanner',   d:'Optional Qlib-driven execution planner (aggregate sizing)'}
    ],
    patterns:['Orchestrator','Dependency Injection','Async/Await (C++20)','Observer','Pipeline of Gates'],
    features:[
      'Boost.Asio C++20 coroutines (co_await / co_spawn)',
      'Sequential scan cycle prevents concurrent position write races',
      'Ports: IScannerPort / IAccountPort / IOrdersPort / IOrderCapPort / IExposurePort / IGeminiFilterPort / IRiskPort / IBacktestGatePort',
      'DecisionArbiter resolves competing signals against per-cycle risk budget',
      'Time-exit + trailing-stop monitors run as separate coroutines',
      'onUserDataEvent() callback updates PositionTracker on fills',
      'External-close cooldown prevents immediate re-entry after manual close'
    ]
  },

  scanner: {
    id:'scanner', label:'Scanner', sub:'Market Data', layer:'biz',
    x:185, y:345,
    desc:'Real-time OHLCV market data collector. On startup fetches exchange info to discover tradable USDT perpetual symbols, warms up the kline cache via REST, then subscribes to WebSocket kline streams for zero-poll data collection.',
    classes:[
      {n:'MarketScanner', d:'Orchestrates symbol discovery, REST warmup, WebSocket subscriptions'},
      {n:'KlineCache',    d:'Thread-safe (symbol × interval) → deque<Kline> FIFO cache'}
    ],
    patterns:['Publisher','Thread-safe Cache','Observer'],
    features:[
      'Auto-discovers tradable USDT perpetual futures symbols',
      'REST warmup fills cache before WebSocket takes over',
      'std::shared_mutex for read-heavy concurrent access',
      'Configurable klineBufferSize (default 200 candles)',
      'Max 512 streams per WebSocket connection',
      'onKlineClosed callback triggers engine scan cycle'
    ]
  },

  strategy: {
    id:'strategy', label:'Strategy', sub:'Interface & Registry', layer:'biz',
    x:365, y:345,
    desc:'Defines the plugin contract (IStrategy), unified per-strategy configuration (StrategyConfig), evaluation result type (Signal), and the runtime StrategyRegistry. Acts as the shared contract between the core engine and all dynamically loaded plugin implementations.',
    classes:[
      {n:'IStrategy',        d:'Pure virtual: config() → StrategyConfig, evaluate(symbol, interval, klines) → Signal'},
      {n:'Signal',           d:'Direction (Long/Short/None), confidence, atr, reason, exitPolicy, shadowOnly'},
      {n:'StrategyConfig',   d:'Unified config: intervals, risk_pct, sl/tp multipliers, atr_period, adapterId'},
      {n:'StrategyRegistry', d:'add() / addShared() / all() / forInterval() — holds shared_ptr<IStrategy>'},
      {n:'ATR',              d:'Average True Range indicator computed over Kline OHLC data'}
    ],
    patterns:['Strategy Pattern','Registry','Interface Segregation'],
    features:[
      'Pure virtual interface isolates core from plugin implementations',
      'Signal carries the ATR value used by SizingPolicy in engine',
      'ExitPolicy (Default / SwingTrailing) drives trailing-stop behaviour',
      'shadowOnly flag for would-have-executed evaluation paths',
      'Registry supports filtering strategies by interval'
    ]
  },

  orders: {
    id:'orders', label:'Orders', sub:'Order Execution', layer:'biz',
    x:550, y:345,
    desc:'Type-safe order execution facade for Binance Futures. Hides the complexity of NormalOrderService and AlgoOrderService behind a clean async interface. Strict pre-flight validation, correlation-id journalling, decimal-string quantity/price, idempotent client IDs, MQL4 adapter for legacy callers.',
    classes:[
      {n:'Orders',              d:'Async facade: market(), limit(), closeByMarket(), setLeverage(), amend, protection, cancel/query'},
      {n:'NormalOrderService',  d:'Limit/market placement, amendment, batch (max 5), cancel/query, fill summary'},
      {n:'AlgoOrderService',    d:'Stop-entry + SL/TP protection orders with separate journal/reconcile'},
      {n:'OrderValidator',      d:'Pre-flight: blocked raw keys, hedge-mode reduceOnly, regex on raw params'},
      {n:'OrderJournal',        d:'InMemory + DurableOrderJournal (append-only file) for intent/state'},
      {n:'OrderIdGenerator',    d:'Namespace-prefixed clientOrderId + correlationId generation'},
      {n:'Mql4Adapter',         d:'Maps MQL4 ops (Buy/Sell/*Limit/*Stop) to typed drafts + protection orders'}
    ],
    patterns:['Facade','Service Layer','Type-safe Builders','Journal/Reconcile'],
    features:[
      'Type-safe drafts: Market/Limit/Close/Amend/StopEntry/Protection',
      'setLeverage(symbol, leverage) for per-symbol leverage updates',
      'Strict raw-param validator with 11 blocked keys + ^[A-Za-z]\\w{0,63}$ regex',
      'PlacementState: Accepted / Rejected / UnknownPendingReconcile',
      'Durable journal enforced when allowBestEffortJournal=false',
      'OrderPoolSnapshot enriches metadata from the journal'
    ]
  },

  account: {
    id:'account', label:'Account', sub:'Account State', layer:'biz',
    x:730, y:345,
    desc:'Abstracts the Binance account REST API to provide consistent snapshots of wallet balance, open positions, and margin information. Used by SignalEngine to verify sufficient capital before opening a new position, and by RiskController to sample equity over time.',
    classes:[
      {n:'AccountService',           d:'Async: snapshot(), checkFreeMargin(), liquidationRisk()'},
      {n:'AccountSnapshot',          d:'totalWalletBalance, availableBalance, totalMarginBalance, positions[]'},
      {n:'RestAccountClientAdapter', d:'Adapts RestClient via IRestAccountClient interface'},
      {n:'Mql4AccountAdapter',       d:'MQL4-style accessors for legacy callers'}
    ],
    patterns:['Service Layer','Snapshot Pattern','Adapter'],
    features:[
      'Returns consistent point-in-time account snapshot',
      'Checks available margin before engine calls SizingPolicy',
      'Provides liquidation price and margin ratio',
      'Equity samples feed RiskController + EquityCurve',
      'MQL4 compatibility adapter for legacy support'
    ]
  },

  backtest: {
    id:'backtest', label:'Backtest', sub:'Walk-Forward Gate', layer:'biz',
    x:915, y:345,
    desc:'In-memory walk-forward backtesting gate. Evaluates a candidate signal across folds of recent klines, runs grid search over per-strategy parameter spaces, applies plateau + majority-vote filters, and only forwards the signal to the engine if it passes. Optionally uses Gemini to propose parameter ranges. No RNG — deterministic for identical inputs.',
    classes:[
      {n:'BacktestEngine',                 d:'Deterministic per-fold simulator (next-bar fills, ATR SL/TP, fees, time-exit)'},
      {n:'BacktestGateController',         d:'Implements IBacktestGatePort: orchestrates walk-forward + plateau vote'},
      {n:'WalkForward',                    d:'Splits history into IS/OOS folds with signal-bar holdout'},
      {n:'ParameterSpace',                 d:'Grid of param points with combo budget enforcement'},
      {n:'PlateauFinder',                  d:'Stability-of-optimum check via neighborhood pass-fraction'},
      {n:'GeminiRangeProposer',            d:'Calls tools/backtest_range_proposer Python for range hints'},
      {n:'RestBackfillingHistoricalWindowProvider', d:'Cache-then-REST window assembly'},
      {n:'IndicatorAdapters',              d:'Adapts indicator strategies (golden, donchian, gartley) to IOptimizableStrategy'}
    ],
    patterns:['Gate','Walk-Forward Validation','Grid Search','Adapter'],
    features:[
      'history_source: cache_only or cache_then_rest',
      'Per-cycle evaluation cap + global combo budget',
      'Shadow-only mode logs without blocking',
      'Whitelist of eligible strategies (golden_crossover, donchian_5_20_crossover, gartley_day_crossover)',
      'Result: PassResult (with optimized params + plateau vote) or DropDetail'
    ]
  },

  risk: {
    id:'risk', label:'Risk', sub:'Drawdown & Sortino Gate', layer:'biz',
    x:1095, y:345,
    desc:'Portfolio-level risk controller. Persists equity samples per scan cycle into SQLite, recomputes Sortino / Sharpe / Ulcer Index / Max Drawdown on a configurable cadence, and gates new position opens via SOFT_BREACH / HARD_BREACH thresholds. Decoupled from engine via IRiskPort.',
    classes:[
      {n:'RiskController', d:'Implements IRiskPort: canOpenPosition(), onScanCycle(), onPositionClosed()'},
      {n:'RiskDb',         d:'SQLite store for equity samples (margin or wallet basis)'},
      {n:'EquityCurve',    d:'In-memory rolling equity sampler with persistence flush'},
      {n:'RiskMetrics',    d:'Sortino, Sharpe, Ulcer Index, UPI, MaxDrawdown over rolling window'}
    ],
    patterns:['Circuit Breaker','Rolling Window Metrics','Repository'],
    features:[
      'Configurable equity basis: margin (default) or wallet',
      'soft/hard MaxDrawdown + soft/hard min UPI thresholds',
      'failureMode Open/Closed + missingDataMode Open/Closed',
      'Recompute cadence + min data points before metrics valid',
      'NoOpRiskPort fallback when risk gating disabled'
    ]
  },

  rest: {
    id:'rest', label:'REST Client', sub:'HTTP Abstraction', layer:'infra',
    x:320, y:485,
    desc:'Async HTTP client wrapping the Binance REST API. Handles HMAC-SHA256 request signing, token-bucket rate limiting to stay within Binance weight limits (1200/min), and all endpoint mappings including klines, orders, account data, and leverage changes.',
    classes:[
      {n:'RestClient',  d:'Main interface: ping(), serverTime(), exchangeInfo(), klines(), placeOrder(), setLeverage()…'},
      {n:'Signer',      d:'HMAC-SHA256 request authentication with API key/secret'},
      {n:'RateLimiter', d:'Token bucket enforcing Binance 1200-weight-per-minute limit'}
    ],
    patterns:['Adapter','Token Bucket','Chain of Responsibility'],
    features:[
      'All HTTP calls are async (Boost.Asio coroutines)',
      'HMAC-SHA256 signing via OpenSSL',
      'Token bucket rate limiter prevents 429 HTTP errors',
      'Parses X-MBX-USED-WEIGHT headers from responses',
      'Supports both testnet and mainnet base URLs'
    ]
  },

  ws: {
    id:'ws', label:'WebSocket', sub:'Real-time Streams', layer:'infra',
    x:640, y:485,
    desc:'Manages persistent WebSocket connections to Binance for real-time kline data and user account events via UserDataStream. Auto-reconnects on network interruption. Fires callbacks into the engine when order fills or position changes occur.',
    classes:[
      {n:'WsClient',       d:'WebSocket connection manager: subscribeKline() with auto-reconnect'},
      {n:'UserDataStream', d:'Listens for order fills, position changes, and liquidation alerts'}
    ],
    patterns:['Observer','Reactor','Auto-reconnect'],
    features:[
      'Boost.Beast WebSocket protocol implementation',
      'Handles multiplexed combined streams (up to 512 per connection)',
      'Auto-reconnect with backoff on network interruption',
      'UserDataStream fires onUserDataEvent callbacks to SignalEngine',
      'JSON parsing via nlohmann/json with ws_parse_helpers'
    ]
  },

  context: {

const LAYER_META = {
  entry: {label:'Entry Point',  color:'#3fb950'},
  orch:  {label:'Orchestration',color:'#58a6ff'},
  biz:   {label:'Business Logic',color:'#ffa657'},
  infra: {label:'Infrastructure',color:'#d2a8ff'},
  found: {label:'Foundation',   color:'#79c0ff'},
};

const BW = 74, BH = 29; // half box width/height

let sel = null;

// ── Box rendering ────────────────────────────────────────────────────────────
function renderBoxes() {
  const cont = document.getElementById('boxes');
  Object.values(MODS).forEach(m => {
    const d = document.createElement('div');
    d.className = `mbox l-${m.layer}`;
    d.id = `b-${m.id}`;
    d.style.left = m.x + 'px';
    d.style.top  = m.y + 'px';
    d.innerHTML  = `<div class="mn">${m.label}</div><div class="ms">${m.sub}</div>`;
    d.addEventListener('click', () => pick(m.id));
    cont.appendChild(d);
  });
}

// ── Edge rendering ───────────────────────────────────────────────────────────
function boxExit(m, nx, ny) {
  // Find exit point on box boundary given normalised direction (nx,ny)
  const tx = nx !== 0 ? BW / Math.abs(nx) : Infinity;
  const ty = ny !== 0 ? BH / Math.abs(ny) : Infinity;
  const t  = Math.min(tx, ty);
  return [m.x + nx * t, m.y + ny * t];
}

function renderEdges() {
  const svg = document.getElementById('edge-svg');

  // Defs for arrowheads
  const defs = svg.appendChild(mkSVG('defs'));
  ['n','c'].forEach((k,i) => {
    const mk = mkSVG('marker');
    mk.setAttribute('id',`arr-${k}`);
    mk.setAttribute('viewBox','0 0 10 10');
    mk.setAttribute('refX','9'); mk.setAttribute('refY','5');
    mk.setAttribute('markerWidth','5'); mk.setAttribute('markerHeight','5');
    mk.setAttribute('orient','auto-start-reverse');
    const p = mkSVG('path');
    p.setAttribute('d','M 0 0 L 10 5 L 0 10 z');
    p.setAttribute('fill', i===0 ? '#444c56' : '#3fb950');
    mk.appendChild(p); defs.appendChild(mk);
  });

  EDGES.forEach(([sid,tid,lbl,type]) => {
    const s = MODS[sid], t = MODS[tid];
    if (!s || !t) return;

    const dx = t.x - s.x, dy = t.y - s.y;
    const len = Math.sqrt(dx*dx + dy*dy);
    if (len < 1) return;
    const nx = dx/len, ny = dy/len;

    const [sx,sy] = boxExit(s,  nx,  ny);
    const [ex,ey] = boxExit(t, -nx, -ny);

    // Slight perpendicular offset for curve aesthetics
    const off = 0.12;
    const cpx = (sx+ex)/2 + (-ny)*len*off;
    const cpy = (sy+ey)/2 + ( nx)*len*off;

    const g = svg.appendChild(mkSVG('g'));
    g.classList.add('edge');
    g.dataset.s = sid; g.dataset.t = tid;

    const path = g.appendChild(mkSVG('path'));
    path.setAttribute('d', `M${sx},${sy} Q${cpx},${cpy} ${ex},${ey}`);
    path.setAttribute('fill','none');
    path.setAttribute('stroke', type==='cb' ? '#3fb950' : '#2d333b');
    path.setAttribute('stroke-width', type==='cb' ? '1.8' : '1.3');
    if (type==='cb') path.setAttribute('stroke-dasharray','5 3');
    path.setAttribute('marker-end', `url(#arr-${type==='cb'?'c':'n'})`);
    path.setAttribute('opacity','0.7');
  });
}

function mkSVG(tag) {
  return document.createElementNS('http://www.w3.org/2000/svg', tag);
}

// ── Interaction ──────────────────────────────────────────────────────────────
function pick(id) {
  if (sel) {
    document.getElementById(`b-${sel}`)?.classList.remove('sel');
  }
  if (sel === id) {
    sel = null;
    resetEdges();
    document.getElementById('empty-state').style.display = '';
    document.getElementById('detail').style.display = 'none';
    return;
  }
  sel = id;
  document.getElementById(`b-${id}`)?.classList.add('sel');
  highlightEdges(id);
  renderDetail(MODS[id]);
}

function highlightEdges(id) {
  document.querySelectorAll('.edge').forEach(g => {
    const p = g.querySelector('path');
    if (g.dataset.s === id || g.dataset.t === id) {
      p.setAttribute('opacity','1');
      const isCb = p.getAttribute('stroke-dasharray') === '5 3';
      const isOut = g.dataset.s === id;
      p.setAttribute('stroke', isOut ? '#58a6ff' : (isCb ? '#3fb950' : '#ffa657'));
      p.setAttribute('stroke-width','2');
    } else {
      p.setAttribute('opacity','0.08');
    }
  });
}

function resetEdges() {
  document.querySelectorAll('.edge path').forEach(p => {
    const isCb = p.getAttribute('stroke-dasharray') === '5 3';
    p.setAttribute('stroke', isCb ? '#3fb950' : '#2d333b');
    p.setAttribute('stroke-width', isCb ? '1.8' : '1.3');
    p.setAttribute('opacity','0.7');
  });
}

// ── Detail panel ─────────────────────────────────────────────────────────────
function renderDetail(m) {
  document.getElementById('empty-state').style.display = 'none';
  const panel = document.getElementById('detail');
  panel.style.display = '';

  const lm = LAYER_META[m.layer];
  const out = EDGES.filter(e => e[0] === m.id);
  const inn = EDGES.filter(e => e[1] === m.id);

  const cls = m.classes.map(c => `
    <div class="cls">
      <div class="cname">${c.n}</div>
      <div class="cdesc">${c.d}</div>
    </div>`).join('');

  const feats = m.features.map(f =>
    `<div class="feat"><span class="feat-dot">◆</span>${f}</div>`
  ).join('');

  const pats = m.patterns.map(p =>
    `<span class="ptag">${p}</span>`
  ).join('');

  const outHtml = out.length ? `
    <div class="slabel">Outgoing Dependencies</div>
    <div class="int-list">${out.map(([s,t,lbl]) => `
      <div class="int-item" onclick="pick('${t}')">
        <span class="arr out">→</span>
        <div><span class="iname">${MODS[t]?.label}</span><span class="ilbl"> · ${lbl}</span></div>
      </div>`).join('')}</div>` : '';

  const inHtml = inn.length ? `
    <div class="slabel">Used By</div>
    <div class="int-list">${inn.map(([s,t,lbl]) => `
      <div class="int-item" onclick="pick('${s}')">
        <span class="arr in">←</span>
        <div><span class="iname">${MODS[s]?.label}</span><span class="ilbl"> · ${lbl}</span></div>
      </div>`).join('')}</div>` : '';

  panel.innerHTML = `
    <div class="mtitle">${m.label}</div>
    <div class="lbadge" style="background:${lm.color}18;border:1px solid ${lm.color}40;color:${lm.color}">
      <span class="dot6" style="background:${lm.color}"></span>${lm.label}
    </div>

    <div class="slabel">Purpose</div>
    <div class="desc">${m.desc}</div>

    <div class="slabel">Key Classes</div>
    <div class="cls-list">${cls}</div>

    <div class="slabel">Features</div>
    <div class="feat-list">${feats}</div>

    <div class="slabel">Design Patterns</div>
    <div class="tag-row">${pats}</div>

    ${outHtml}${inHtml}
  `;
}

// ── Layer band backgrounds ────────────────────────────────────────────────────
function renderBands() {
  const svg = document.getElementById('edge-svg');
  const bands = [
    {y1:20,  y2:120, color:'#3fb950', label:'Entry'},
    {y1:150, y2:250, color:'#58a6ff', label:'Orchestration'},
    {y1:295, y2:395, color:'#ffa657', label:'Business Logic'},
    {y1:435, y2:535, color:'#d2a8ff', label:'Infrastructure'},
    {y1:575, y2:675, color:'#79c0ff', label:'Foundation'},
  ];
  bands.forEach(b => {
    const rect = mkSVG('rect');
    rect.setAttribute('x','0');
    rect.setAttribute('y', b.y1);
    rect.setAttribute('width','1280');
    rect.setAttribute('height', b.y2 - b.y1);
    rect.setAttribute('fill', b.color);
    rect.setAttribute('opacity','0.03');
    rect.setAttribute('rx','4');
    svg.insertBefore(rect, svg.firstChild);

    const txt = mkSVG('text');
    txt.setAttribute('x','8');
    txt.setAttribute('y', b.y1 + 14);
    txt.setAttribute('fill', b.color);
    txt.setAttribute('opacity','0.35');
    txt.setAttribute('font-size','10');
    txt.setAttribute('font-weight','700');
    txt.setAttribute('letter-spacing','1');
    txt.setAttribute('font-family','system-ui,sans-serif');
    txt.textContent = b.label.toUpperCase();
    svg.insertBefore(txt, svg.firstChild);
  });
}

renderBoxes();
